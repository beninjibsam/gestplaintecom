name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build release APK (signé)
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APKs
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk out/CorisPlaintes-release.apk
          cp app/build/outputs/apk/debug/app-debug.apk    out/CorisPlaintes-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: CorisPlaintes-release-apk
          path: out/CorisPlaintes-release.apk
          retention-days: 90

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: CorisPlaintes-debug-apk
          path: out/CorisPlaintes-debug.apk
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/CorisPlaintes-release.apk
            out/CorisPlaintes-debug.apk
          generate_release_notes: true
