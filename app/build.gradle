plugins {
    id 'com.android.application'
}

android {
    namespace 'com.plaintes.app'
    compileSdk 34

    defaultConfig {
        applicationId "bf.coris.plaintes"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        release {
            // Keystore généré dynamiquement par le workflow CI (keytool)
            storeFile file("${rootDir}/release.keystore")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: 'CorisPlaintes2026'
            keyAlias System.getenv("KEY_ALIAS") ?: 'plaintes'
            keyPassword System.getenv("KEY_PASSWORD") ?: 'CorisPlaintes2026'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-splashscreen:1.0.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
}
